    // ── Supabase Configuration ────────────────────────────────────────────
    const SUPABASE_URL = "https://dlgwswumjcvujlseghhl.supabase.co";
    const SUPABASE_KEY = "sb_publishable_1SCUE3HFvXjq7VPqHE8y6Q_lXVArBOO";

    // Supabase REST helper
    async function sbFetch(path, opts = {}) {
      const url = SUPABASE_URL + "/rest/v1/" + path;
      const headers = {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json",
        "Prefer": "return=representation",
        ...(opts.headers || {})
      };
      const res = await fetch(url, { ...opts, headers });
      if (!res.ok) {
        const text = await res.text();
        console.error("Supabase error:", res.status, text);
        throw new Error("Supabase " + res.status);
      }
      if (res.status === 204) return null;
      return await res.json();
    }

    window.db = {
      // Therapists
      async getTherapists() {
        return await sbFetch("therapists?select=*");
      },
      async upsertTherapist(t) {
        return await sbFetch("therapists?on_conflict=id", {
          method: "POST",
          headers: { "Prefer": "resolution=merge-duplicates,return=representation" },
          body: JSON.stringify(t)
        });
      },
      async deleteTherapist(id) {
        return await sbFetch("therapists?id=eq." + encodeURIComponent(id), { method: "DELETE" });
      },
      // Patients
      async getPatients() {
        return await sbFetch("patients?select=*");
      },
      async upsertPatient(p) {
        return await sbFetch("patients?on_conflict=id", {
          method: "POST",
          headers: { "Prefer": "resolution=merge-duplicates,return=representation" },
          body: JSON.stringify(p)
        });
      },
      async deletePatient(id) {
        return await sbFetch("patients?id=eq." + encodeURIComponent(id), { method: "DELETE" });
      },
      // Exercises
      async getExercises() {
        const rows = await sbFetch("exercises?select=*");
        return rows.map(r => ({ id: r.id, name: r.name, category: r.category, videoUrl: r.video_url, description: r.description }));
      },
      async upsertExercise(e) {
        const dbRow = { id: e.id, name: e.name, category: e.category, video_url: e.videoUrl, description: e.description };
        return await sbFetch("exercises?on_conflict=id", {
          method: "POST",
          headers: { "Prefer": "resolution=merge-duplicates,return=representation" },
          body: JSON.stringify(dbRow)
        });
      },
      async deleteExercise(id) {
        return await sbFetch("exercises?id=eq." + encodeURIComponent(id), { method: "DELETE" });
      },
      // Plans
      async getPlans() {
        const rows = await sbFetch("plans?select=*");
        return rows.map(r => ({ id: r.id, patientId: r.patient_id, name: r.name, phases: r.phases }));
      },
      async upsertPlan(p) {
        const dbRow = { id: p.id, patient_id: p.patientId, name: p.name, phases: p.phases };
        return await sbFetch("plans?on_conflict=id", {
          method: "POST",
          headers: { "Prefer": "resolution=merge-duplicates,return=representation" },
          body: JSON.stringify(dbRow)
        });
      },
      async deletePlan(id) {
        return await sbFetch("plans?id=eq." + encodeURIComponent(id), { method: "DELETE" });
      },
      // Logs
      async getLogs() {
        const rows = await sbFetch("logs?select=*");
        return rows.map(r => ({ id: r.id, patientId: r.patient_id, exerciseId: r.exercise_id, sets: r.sets, date: r.date, reps: r.reps, duration: r.duration, weight: r.weight, rpe: r.rpe, note: r.note, mode: r.mode, ts: r.ts || (r.created_at ? new Date(r.created_at).getTime() : Date.now()) }));
      },
      async upsertLog(l) {
        const dbRow = { 
          id: l.id, 
          patient_id: l.patientId, 
          exercise_id: l.exerciseId, 
          date: l.date || null,
          reps: l.reps || null, 
          duration: l.duration || null, 
          weight: l.weight || null, 
          rpe: l.rpe ? parseInt(l.rpe) : null, 
          note: l.note || null, 
          mode: l.mode || null 
        };
        return await sbFetch("logs?on_conflict=id", {
          method: "POST",
          headers: { "Prefer": "resolution=merge-duplicates,return=representation" },
          body: JSON.stringify(dbRow)
        });
      },
      async deleteLog(id) {
        return await sbFetch("logs?id=eq." + encodeURIComponent(id), { method: "DELETE" });
      },
      // Groups
      async getGroups() {
        const rows = await sbFetch("exercise_groups?select=*");
        return rows.map(r => ({ id: r.id, name: r.name, levels: r.levels || [] }));
      },
      async upsertGroup(g) {
        return await sbFetch("exercise_groups?on_conflict=id", {
          method: "POST",
          headers: { "Prefer": "resolution=merge-duplicates,return=representation" },
          body: JSON.stringify({ id: g.id, name: g.name, levels: g.levels })
        });
      },
      async deleteGroup(id) {
        return await sbFetch("exercise_groups?id=eq." + encodeURIComponent(id), { method: "DELETE" });
      }
    };

    // Fallback localStorage (für Offline)
    window.storage = {
      get: async (key) => { try { const v = localStorage.getItem(key); if (v) return { key, value: v }; } catch {} return null; },
      set: async (key, value) => { try { localStorage.setItem(key, value); } catch {} return { key, value }; },
      delete: async (key) => { try { localStorage.removeItem(key); } catch {} return { key, deleted: true }; },
      list: async () => ({ keys: [] })
    };

async function load(key) {
  try { const r = await window.storage.get(key); return r ? JSON.parse(r.value) : null; } catch { return null; }
}
async function save(key, val) {
  try { await window.storage.set(key, JSON.stringify(val)); } catch {}
}

// Cloud sync - speichert in Supabase und localStorage (Backup)
async function syncToCloud(table, items, prevItems) {
  window.__qrSaving = true;
  try {
    // Find deleted items
    const prevIds = (prevItems || []).map(x => x.id);
    const currentIds = items.map(x => x.id);
    const deletedIds = prevIds.filter(id => !currentIds.includes(id));

    // Delete removed items
    for (const id of deletedIds) {
      if (table === "therapists") await window.db.deleteTherapist(id);
      else if (table === "patients") await window.db.deletePatient(id);
      else if (table === "exercises") await window.db.deleteExercise(id);
      else if (table === "plans") await window.db.deletePlan(id);
      else if (table === "logs") await window.db.deleteLog(id);
      else if (table === "groups") await window.db.deleteGroup(id);
    }

    // Upsert all current items
    for (const item of items) {
      if (table === "therapists") await window.db.upsertTherapist(item);
      else if (table === "patients") await window.db.upsertPatient(item);
      else if (table === "exercises") await window.db.upsertExercise(item);
      else if (table === "plans") await window.db.upsertPlan(item);
      else if (table === "logs") await window.db.upsertLog(item);
      else if (table === "groups") await window.db.upsertGroup(item);
    }
  } catch (e) {
    console.warn("Cloud sync failed (saved locally):", e);
  } finally {
    // Keep flag set for 3 more seconds to avoid race conditions
    setTimeout(() => { window.__qrSaving = false; }, 3000);
  }
}

function App() {
  const [mode, setMode] = useState(null);
  const [therapistId, setTherapistId] = useState(null);
  const [exercises, setExercises] = useState(SEED_EXERCISES);
  const [patients, setPatients] = useState(SEED_PATIENTS);
  const [therapists, setTherapists] = useState(SEED_THERAPISTS);
  const [plans, setPlans] = useState([]);
  const [logs, setLogs] = useState([]);
  const [groups, setGroups] = useState([]);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        // Try cloud first
        const [ex, pa, th, pl, lo, gr] = await Promise.all([
          window.db.getExercises(),
          window.db.getPatients(),
          window.db.getTherapists(),
          window.db.getPlans(),
          window.db.getLogs(),
          window.db.getGroups().catch(() => [])
        ]);
        // Load local backup too
        const localLogs = (await load("qr_logs")) || [];
        // Merge: combine cloud logs + local logs (local wins on duplicate IDs)
        const cloudIds = new Set((lo || []).map(x => x.id));
        const localOnly = localLogs.filter(x => !cloudIds.has(x.id));
        const mergedLogs = [...(lo || []), ...localOnly];
        // Re-upload any local-only logs so they don't get lost
        for (const log of localOnly) {
          try { await window.db.upsertLog(log); } catch {}
        }
        // If cloud has data, use it. Otherwise seed.
        if (ex && ex.length > 0) setExercises(ex); else { setExercises(SEED_EXERCISES); for (const e of SEED_EXERCISES) await window.db.upsertExercise(e); }
        if (pa && pa.length > 0) setPatients(pa); else { setPatients(SEED_PATIENTS); for (const p of SEED_PATIENTS) await window.db.upsertPatient(p); }
        if (th && th.length > 0) setTherapists(th); else { setTherapists(SEED_THERAPISTS); for (const t of SEED_THERAPISTS) await window.db.upsertTherapist(t); }
        setPlans(pl || []);
        setLogs(mergedLogs);
        setGroups(gr || []);
      } catch (e) {
        console.warn("Cloud load failed, using local:", e);
        const ex = await load("qr_exercises"); if (ex) setExercises(ex);
        const pa = await load("qr_patients"); if (pa) setPatients(pa);
        const th = await load("qr_therapists"); if (th) setTherapists(th);
        const pl = await load("qr_plans"); if (pl) setPlans(pl);
        const lo = await load("qr_logs"); if (lo) setLogs(lo);
      }
      setLoaded(true);
    })();
    // Auto-refresh every 10 seconds so patient sees therapist's changes
    const intv = setInterval(async () => {
      // Skip refresh entirely if user is actively interacting or saving
      if (window.__qrSaving) return;
      if (window.__qrLogModalOpen) return;
      try {
        const [ex, pa, th, pl, gr] = await Promise.all([
          window.db.getExercises(),
          window.db.getPatients(),
          window.db.getTherapists(),
          window.db.getPlans(),
          window.db.getGroups().catch(() => [])
        ]);
        if (window.__qrSaving) return;
        if (window.__qrLogModalOpen) return;
        // Only update items the user isn't actively modifying
        if (ex) setExercises(ex);
        if (pa) setPatients(pa);
        if (th) setTherapists(th);
        if (pl) setPlans(pl);
        if (gr) setGroups(gr);
        // Logs: MERGE only - never overwrite local
        try {
          const cloudLogs = await window.db.getLogs();
          if (cloudLogs) {
            setLogs(prev => {
              const localIds = new Set(prev.map(x => x.id));
              const newFromCloud = cloudLogs.filter(x => !localIds.has(x.id));
              if (newFromCloud.length === 0) return prev;
              return [...prev, ...newFromCloud];
            });
          }
        } catch {}
      } catch {}
    }, 20000);
    return () => clearInterval(intv);
  }, []);

  const prevExercises = useRef([]);
  const prevPatients = useRef([]);
  const prevTherapists = useRef([]);
  const prevPlans = useRef([]);
  const prevLogs = useRef([]);

  useEffect(() => { if (loaded) { save("qr_exercises", exercises); syncToCloud("exercises", exercises, prevExercises.current); prevExercises.current = exercises; } }, [exercises, loaded]);
  useEffect(() => { if (loaded) { save("qr_patients", patients); syncToCloud("patients", patients, prevPatients.current); prevPatients.current = patients; } }, [patients, loaded]);
  useEffect(() => { if (loaded) { save("qr_therapists", therapists); syncToCloud("therapists", therapists, prevTherapists.current); prevTherapists.current = therapists; } }, [therapists, loaded]);
  useEffect(() => { if (loaded) { save("qr_plans", plans); syncToCloud("plans", plans, prevPlans.current); prevPlans.current = plans; } }, [plans, loaded]);
  useEffect(() => { if (loaded) { save("qr_logs", logs); syncToCloud("logs", logs, prevLogs.current); prevLogs.current = logs; } }, [logs, loaded]);
  const prevGroups = useRef([]);
  useEffect(() => { if (loaded) { save("qr_groups", groups); syncToCloud("groups", groups, prevGroups.current); prevGroups.current = groups; } }, [groups, loaded]);

  if (!loaded) return (
    <div style={{ background: BG, height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: "white", fontFamily: "'DM Sans',sans-serif" }}>Laden…</div>
  );

  const shared = { exercises, setExercises, patients, setPatients, therapists, setTherapists, plans, setPlans, logs, setLogs, groups, setGroups };
  const currentTherapist = therapists.find(t => t.id === therapistId);

  return (
    <div style={{ fontFamily: "'DM Sans','Helvetica Neue',sans-serif", background: BG, minHeight: "100vh", color: "white" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:${BG}}::-webkit-scrollbar-thumb{background:${BORDER};border-radius:2px}
        input,textarea,select,button{font-family:'DM Sans',sans-serif;}
        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
      `}</style>
      {mode === null && <HomeScreen setMode={setMode} />}
      {mode === "therapist" && !therapistId && (
        <TherapistPinLogin therapists={therapists} onSuccess={setTherapistId} onBack={() => setMode(null)} />
      )}
      {mode === "therapist" && therapistId && (
        <TherapistApp {...shared} currentTherapist={currentTherapist} onBack={() => { setMode(null); setTherapistId(null); }} />
      )}
      {mode === "patient" && <PatientApp {...shared} onBack={() => setMode(null)} />}
    </div>
  );
}

// ── Therapist PIN Login ────────────────────────────────────────────────────
function TherapistPinLogin({ therapists, onSuccess, onBack }) {
  const [pin, setPin] = useState(["", "", "", ""]);
  const [error, setError] = useState(false);
  const [shake, setShake] = useState(false);
  const r0 = useRef(null); const r1 = useRef(null); const r2 = useRef(null); const r3 = useRef(null);
  const refs = [r0, r1, r2, r3];

  function handleDigit(idx, val) {
    if (!/^\d?$/.test(val)) return;
    const next = [...pin]; next[idx] = val; setPin(next); setError(false);
    if (val && idx < 3) refs[idx + 1].current?.focus();
    if (next.every(d => d !== "")) {
      const match = therapists.find(t => t.pin === next.join(""));
      if (match) { onSuccess(match.id); }
      else { setError(true); setShake(true); setTimeout(() => { setShake(false); setPin(["","","",""]); refs[0].current?.focus(); }, 600); }
    }
  }
  function handleKeyDown(idx, e) { if (e.key === "Backspace" && !pin[idx] && idx > 0) refs[idx - 1].current?.focus(); }

  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column" }}>
      <TopBar onBack={onBack} title="Therapeuten-Bereich" />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32, animation: "fadeIn .4s ease" }}>
        <div style={{ marginBottom: 32 }}><IconTherapist size={52} color={ACCENT} /></div>
        <div style={{ fontWeight: 800, fontSize: 24, marginBottom: 8 }}>Therapeuten-Login</div>
        <div style={{ fontSize: 13, color: GRAY, marginBottom: 48, textAlign: "center", maxWidth: 260, lineHeight: 1.8 }}>
          Bitte gib deinen persönlichen<br />4-stelligen PIN-Code ein
        </div>
        <div style={{ display: "flex", gap: 16, animation: shake ? "shake .5s ease" : "none" }}>
          {pin.map((digit, i) => (
            <input key={i} ref={refs[i]} type="password" inputMode="numeric" maxLength={1} value={digit}
              onChange={e => handleDigit(i, e.target.value)} onKeyDown={e => handleKeyDown(i, e)} autoFocus={i === 0}
              style={{ width: 64, height: 76, textAlign: "center", fontSize: 30, fontWeight: 800,
                background: error ? "#1e0909" : CARD,
                border: `2px solid ${error ? "#d94f4f" : digit ? ACCENT : BORDER}`,
                borderRadius: 14, color: error ? "#d94f4f" : "white", outline: "none", transition: "all .2s", caretColor: "transparent" }} />
          ))}
        </div>
        {error && <div style={{ marginTop: 20, color: "#d94f4f", fontSize: 13 }}>✕ Falscher PIN — bitte erneut versuchen</div>}
        <div style={{ marginTop: 56, fontSize: 11, color: GRAY, textAlign: "center", lineHeight: 1.9 }}>
          Nur für autorisierte Therapeuten<br />von Quarter of Rehab & Fitness.
        </div>
      </div>
    </div>
  );
}

function GroupManager({ groups, setGroups, exercises }) {
  const [adding, setAdding] = useState(false);
  const [editId, setEditId] = useState(null);
  const [name, setName] = useState("");
  const [expandedId, setExpandedId] = useState(null);

  function saveGroup() {
    if (!name.trim()) return;
    if (editId) {
      setGroups(prev => prev.map(g => g.id === editId ? { ...g, name } : g));
      setEditId(null);
    } else {
      const newG = { id: "g" + uid(), name, levels: [] };
      setGroups(prev => [...prev, newG]);
      setExpandedId(newG.id);
    }
    setName(""); setAdding(false);
  }

  function addLevel(gid) {
    setGroups(prev => prev.map(g => {
      if (g.id !== gid) return g;
      const next = (g.levels || []).length + 1;
      return { ...g, levels: [...(g.levels || []), { id: "l" + uid(), label: "Level " + next, exerciseId: "" }] };
    }));
  }
  function updateLevel(gid, lid, field, val) {
    setGroups(prev => prev.map(g => g.id !== gid ? g : { ...g, levels: g.levels.map(l => l.id === lid ? { ...l, [field]: val } : l) }));
  }
  function deleteLevel(gid, lid) {
    setGroups(prev => prev.map(g => g.id !== gid ? g : { ...g, levels: g.levels.filter(l => l.id !== lid) }));
  }
  function moveLevel(gid, lid, dir) {
    setGroups(prev => prev.map(g => {
      if (g.id !== gid) return g;
      const idx = g.levels.findIndex(l => l.id === lid);
      const newIdx = idx + dir;
      if (newIdx < 0 || newIdx >= g.levels.length) return g;
      const arr = [...g.levels];
      [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
      return { ...g, levels: arr };
    }));
  }

  return (
    <div>
      <SectionHeader title="Gruppen" count={groups.length} action={<Btn accent onClick={() => { setAdding(true); setEditId(null); setName(""); }}>+ Gruppe</Btn>} />
      <div style={{ fontSize: 12, color: GRAY, marginBottom: 16, lineHeight: 1.6 }}>Organisiere Übungen in Progressions-Gruppen (z.B. "Kniedominant" mit Level 1-5). Nur für dich sichtbar — der Patient sieht nur die ausgewählte Übung.</div>
      {adding && (
        <Card style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: ACCENT, marginBottom: 12 }}>{editId ? "Gruppe umbenennen" : "Neue Gruppe"}</div>
          <Input placeholder="Name (z.B. Kniedominant)" value={name} onChange={e => setName(e.target.value)} />
          <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
            <Btn accent onClick={saveGroup}>Speichern</Btn>
            <Btn onClick={() => { setAdding(false); setEditId(null); }}>Abbrechen</Btn>
          </div>
        </Card>
      )}
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {groups.map(g => {
          const isOpen = expandedId === g.id;
          return (
            <Card key={g.id}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }} onClick={() => setExpandedId(isOpen ? null : g.id)}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 15 }}>{g.name}</div>
                  <div style={{ fontSize: 11, color: GRAY, marginTop: 2 }}>{(g.levels || []).length} Level</div>
                </div>
                <div style={{ display: "flex", gap: 6 }} onClick={e => e.stopPropagation()}>
                  <SmallBtn onClick={() => { setName(g.name); setEditId(g.id); setAdding(true); }}>✎</SmallBtn>
                  <SmallBtn onClick={() => { if(window.confirm("Gruppe wirklich löschen?")) setGroups(prev => prev.filter(x => x.id !== g.id)); }}>✕</SmallBtn>
                  <SmallBtn>{isOpen ? "▲" : "▼"}</SmallBtn>
                </div>
              </div>
              {isOpen && (
                <div style={{ marginTop: 14, borderTop: `1px solid ${BORDER}`, paddingTop: 14 }}>
                  {(g.levels || []).map((lvl, idx) => {
                    const ex = exercises.find(e => e.id === lvl.exerciseId);
                    return (
                      <div key={lvl.id} style={{ background: LIGHTGRAY, borderRadius: 8, padding: 10, marginBottom: 8, display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                        <Input value={lvl.label} onChange={e => updateLevel(g.id, lvl.id, "label", e.target.value)} style={{ width: 110 }} />
                        <Select value={lvl.exerciseId} onChange={e => updateLevel(g.id, lvl.id, "exerciseId", e.target.value)} style={{ flex: 1, minWidth: 160 }}>
                          <option value="">— Übung wählen —</option>
                          {exercises.map(ex => <option key={ex.id} value={ex.id}>{ex.name}</option>)}
                        </Select>
                        <SmallBtn onClick={() => moveLevel(g.id, lvl.id, -1)} title="Nach oben">↑</SmallBtn>
                        <SmallBtn onClick={() => moveLevel(g.id, lvl.id, 1)} title="Nach unten">↓</SmallBtn>
                        <SmallBtn onClick={() => deleteLevel(g.id, lvl.id)}>✕</SmallBtn>
                      </div>
                    );
                  })}
                  <Btn accent onClick={() => addLevel(g.id)} style={{ marginTop: 4 }}>+ Level hinzufügen</Btn>
                </div>
              )}
            </Card>
          );
        })}
        {groups.length === 0 && <div style={{ color: GRAY, fontSize: 12, textAlign: "center", padding: 30 }}>Noch keine Gruppen angelegt. Tippe auf "+ Gruppe" um zu starten.</div>}
      </div>
    </div>
  );
}

function PlanBuilder({ exercises, patients, plans, setPlans }) {

  const [form, setForm] = useState({ patientId: patients[0]?.id || "", title: "", phases: DEFAULT_PHASES() });
  const [activePhaseId, setActivePhaseId] = useState(null);
  const [pickingFor, setPickingFor] = useState(null);
  const [search, setSearch] = useState("");

  function initForm(base) {
    const f = base || { patientId: patients[0]?.id || "", title: "", phases: DEFAULT_PHASES() };
    setForm(f); setActivePhaseId(f.phases[0]?.id || null); setPickingFor(null);
  }
  function addPhase() {
    const p = { id: uid(), name: "Neue Phase", color: PHASE_COLORS[form.phases.length % PHASE_COLORS.length], items: [] };
    setForm(f => ({ ...f, phases: [...f.phases, p] })); setActivePhaseId(p.id);
  }
  function updatePhaseName(pid, name) { setForm(f => ({ ...f, phases: f.phases.map(p => p.id === pid ? { ...p, name } : p) })); }
  function updatePhaseColor(pid, color) { setForm(f => ({ ...f, phases: f.phases.map(p => p.id === pid ? { ...p, color } : p) })); }
  function deletePhase(pid) {
    setForm(f => ({ ...f, phases: f.phases.filter(p => p.id !== pid) }));
    setActivePhaseId(form.phases.find(p => p.id !== pid)?.id || null);
  }
  function toggleExercise(phaseId, exId) {
    setForm(f => ({ ...f, phases: f.phases.map(p => {
      if (p.id !== phaseId) return p;
      const exists = p.items.find(i => i.exerciseId === exId);
      if (exists) return { ...p, items: p.items.filter(i => i.exerciseId !== exId) };
      return { ...p, items: [...p.items, { exerciseId: exId, sets: 3, mode: "reps", reps: "8-12", duration: "30", weight: "", frequency: "3x/Woche" }] };
    })}));
  }
  function updateItem(phaseId, exId, field, val) {
    setForm(f => ({ ...f, phases: f.phases.map(p => p.id !== phaseId ? p : { ...p, items: p.items.map(i => i.exerciseId === exId ? { ...i, [field]: val } : i) }) }));
  }
  function removeItem(phaseId, exId) {
    setForm(f => ({ ...f, phases: f.phases.map(p => p.id !== phaseId ? p : { ...p, items: p.items.filter(i => i.exerciseId !== exId) }) }));
  }
  function savePlan() {
    if (!form.title.trim() || !form.patientId) return;
    if (editId) { setPlans(prev => prev.map(p => p.id === editId ? { ...form, id: editId } : p)); }
    else { setPlans(prev => [...prev, { ...form, id: "plan" + uid(), createdAt: today() }]); }
    setCreating(false); setEditId(null);
  }
  function editPlan(plan) { initForm({ ...plan, phases: plan.phases || DEFAULT_PHASES() }); setEditId(plan.id); setCreating(true); }

  const activePhase = form.phases.find(p => p.id === activePhaseId);
  const totalItems = form.phases.reduce((a, p) => a + p.items.length, 0);

  return (
    <div>
      <SectionHeader title="Trainingspläne" count={plans.length} action={<Btn accent onClick={() => { initForm(null); setEditId(null); setCreating(true); }}>+ Neuer Plan</Btn>} />
      {creating && (
        <Card style={{ marginBottom: 24 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: ACCENT, marginBottom: 16 }}>{editId ? "Plan bearbeiten" : "Neuer Trainingsplan"}</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 20 }}>
            <Input placeholder="Plantitel" value={form.title} onChange={e => setForm(f => ({ ...f, title: e.target.value }))} />
            <Select value={form.patientId} onChange={e => setForm(f => ({ ...f, patientId: e.target.value }))}>
              {patients.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
            </Select>
          </div>
          <div style={{ fontSize: 11, color: GRAY, letterSpacing: 1, textTransform: "uppercase", marginBottom: 10 }}>Phasen</div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16, alignItems: "center" }}>
            {form.phases.map(phase => (
              <button key={phase.id} onClick={() => { setActivePhaseId(phase.id); setPickingFor(null); }}
                style={{ padding: "6px 14px", borderRadius: 20, border: `1px solid ${phase.id === activePhaseId ? phase.color : BORDER}`, background: phase.id === activePhaseId ? phase.color + "22" : CARD, color: phase.id === activePhaseId ? phase.color : GRAY, fontSize: 12, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ width: 8, height: 8, borderRadius: "50%", background: phase.color, display: "inline-block" }} />
                {phase.name} {phase.items.length > 0 && <span style={{ opacity: .6, fontSize: 10 }}>({phase.items.length})</span>}
              </button>
            ))}
            <SmallBtn onClick={addPhase}>+ Phase</SmallBtn>
          </div>
          {activePhase && (
            <div style={{ background: "#0f0f0f", borderRadius: 12, padding: 16, border: `1px solid ${activePhase.color}33` }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14, flexWrap: "wrap" }}>
                <input value={activePhase.name} onChange={e => updatePhaseName(activePhase.id, e.target.value)}
                  style={{ background: LIGHTGRAY, border: `1px solid ${BORDER}`, color: "white", borderRadius: 8, padding: "6px 12px", fontSize: 14, fontWeight: 700, outline: "none", flex: 1, minWidth: 120 }} />
                <div style={{ display: "flex", gap: 6 }}>
                  {PHASE_COLORS.map(c => (
                    <button key={c} onClick={() => updatePhaseColor(activePhase.id, c)}
                      style={{ width: 20, height: 20, borderRadius: "50%", background: c, border: activePhase.color === c ? "2px solid white" : "2px solid transparent", cursor: "pointer" }} />
                  ))}
                </div>
                {form.phases.length > 1 && <SmallBtn onClick={() => deletePhase(activePhase.id)}>Phase löschen</SmallBtn>}
              </div>
              {activePhase.items.length > 0 && (
                <div style={{ marginBottom: 14 }}>
                  <div style={{ fontSize: 11, color: GRAY, letterSpacing: 1, textTransform: "uppercase", marginBottom: 8 }}>Übungen in dieser Phase</div>
                  {activePhase.items.map(item => {
                    const ex = exercises.find(e => e.id === item.exerciseId);
                    return (
                      <div key={item.exerciseId} style={{ background: LIGHTGRAY, borderRadius: 8, padding: "10px 14px", marginBottom: 6, display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap", borderLeft: `3px solid ${activePhase.color}` }}>
                        <div style={{ fontSize: 13, fontWeight: 600, flex: 1, minWidth: 120 }}>{ex?.name}</div>
                        <label style={{ fontSize: 11, color: GRAY }}>Sätze<br /><SmallInput type="number" value={item.sets} onChange={e => updateItem(activePhase.id, item.exerciseId, "sets", e.target.value)} /></label>
                        <label style={{ fontSize: 11, color: GRAY }}>Modus<br />
                          <Select value={item.mode || "reps"} onChange={e => updateItem(activePhase.id, item.exerciseId, "mode", e.target.value)} style={{ width: 90, fontSize: 11, padding: "4px 8px" }}>
                            <option value="reps">Wdh.</option>
                            <option value="time">Zeit</option>
                          </Select>
                        </label>
                        {(item.mode || "reps") === "reps" ? (
                          <label style={{ fontSize: 11, color: GRAY }}>Wdh. (z.B. 8-12)<br /><SmallInput value={item.reps || ""} onChange={e => updateItem(activePhase.id, item.exerciseId, "reps", e.target.value)} style={{ width: 80 }} /></label>
                        ) : (
                          <label style={{ fontSize: 11, color: GRAY }}>Zeit (Sek.)<br /><SmallInput value={item.duration || ""} onChange={e => updateItem(activePhase.id, item.exerciseId, "duration", e.target.value)} style={{ width: 80 }} /></label>
                        )}
                        <label style={{ fontSize: 11, color: GRAY }}>Gewicht (kg)<br /><SmallInput value={item.weight || ""} onChange={e => updateItem(activePhase.id, item.exerciseId, "weight", e.target.value)} placeholder="optional" style={{ width: 80 }} /></label>
                        <label style={{ fontSize: 11, color: GRAY }}>Frequenz<br /><SmallInput value={item.frequency} onChange={e => updateItem(activePhase.id, item.exerciseId, "frequency", e.target.value)} style={{ width: 90 }} /></label>
                        <SmallBtn onClick={() => removeItem(activePhase.id, item.exerciseId)}>✕</SmallBtn>
                      </div>
                    );
                  })}
                </div>
              )}
              <button onClick={() => setPickingFor(pickingFor === activePhase.id ? null : activePhase.id)}
                style={{ background: pickingFor === activePhase.id ? activePhase.color + "22" : LIGHTGRAY, border: `1px solid ${pickingFor === activePhase.id ? activePhase.color : BORDER}`, color: pickingFor === activePhase.id ? activePhase.color : GRAY, borderRadius: 8, padding: "7px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                {pickingFor === activePhase.id ? "▲ Auswahl schließen" : "+ Übungen hinzufügen"}
              </button>
              {pickingFor === activePhase.id && (
                <div style={{ marginTop: 12 }}>
                  <div style={{ fontSize: 11, color: GRAY, marginBottom: 10, letterSpacing: 1, textTransform: "uppercase" }}>Klicke zum Hinzufügen / Entfernen</div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 8 }}>
                    {exercises.map(ex => <ExCard key={ex.id} ex={ex} selectable selected={!!activePhase.items.find(i => i.exerciseId === ex.id)} phaseColor={activePhase.color} onSelect={() => toggleExercise(activePhase.id, ex.id)} />)}
                  </div>
                </div>
              )}
            </div>
          )}
          <div style={{ display: "flex", gap: 8, marginTop: 16, alignItems: "center" }}>
            <Btn accent onClick={savePlan}>{editId ? "Aktualisieren" : "Plan erstellen"}</Btn>
            <Btn onClick={() => { setCreating(false); setEditId(null); }}>Abbrechen</Btn>
            {totalItems > 0 && <span style={{ fontSize: 12, color: GRAY, marginLeft: 8 }}>{totalItems} Übung(en) in {form.phases.filter(p => p.items.length > 0).length} Phase(n)</span>}
          </div>
        </Card>
      )}
      {plans.length > 3 && (
        <Input placeholder="Suchen nach Patient oder Plantitel…" value={search} onChange={e => setSearch(e.target.value)} style={{ marginBottom: 14 }} />
      )}
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {plans.filter(plan => {
          if (!search.trim()) return true;
          const patient = patients.find(p => p.id === plan.patientId);
          const q = search.toLowerCase();
          return (plan.title || "").toLowerCase().includes(q) || (patient?.name || "").toLowerCase().includes(q);
        }).map(plan => {
          const patient = patients.find(p => p.id === plan.patientId);
          const phases = plan.phases || [];
          const total = phases.reduce((a, p) => a + p.items.length, 0);
          return (
            <Card key={plan.id}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 15 }}>{plan.title}</div>
                  <div style={{ fontSize: 12, color: GRAY, marginTop: 2 }}>{patient?.name} · {total} Übung(en) · {phases.length} Phase(n){plan.createdAt ? ` · ${formatDate(plan.createdAt)}` : ""}</div>
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  <SmallBtn onClick={() => editPlan(plan)}>✎</SmallBtn>
                  <SmallBtn onClick={() => setPlans(prev => prev.filter(p => p.id !== plan.id))}>✕</SmallBtn>
                </div>
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10 }}>
                {phases.map(phase => (
                  <span key={phase.id} style={{ fontSize: 11, padding: "2px 10px", borderRadius: 20, background: phase.color + "22", color: phase.color, border: `1px solid ${phase.color}44` }}>
                    {phase.name} ({phase.items.length})
                  </span>
                ))}
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

function PatientApp({ onBack, patients, exercises, plans, logs, setLogs }) {
  const [patientId, setPatientId] = useState(null);
  const [pin, setPin] = useState("");
  const [error, setError] = useState(false);
  const [shake, setShake] = useState(false);

  function handleChange(val) {
    const clean = val.replace(/\D/g, "").slice(0, 10);
    setPin(clean); setError(false);
    if (clean.length === 10) {
      const match = patients.find(p => p.pin === clean);
      if (match) { setPatientId(match.id); }
      else { setError(true); setShake(true); setTimeout(() => { setShake(false); setPin(""); }, 700); }
    }
  }

  if (!patientId) return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column" }}>
      <TopBar onBack={onBack} title="Patienten-Bereich" />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32, animation: "fadeIn .4s ease" }}>
        <QuarterLogo height={56} />
        <div style={{ marginTop: 40, fontWeight: 800, fontSize: 24, marginBottom: 8 }}>Willkommen</div>
        <div style={{ fontSize: 13, color: GRAY, marginBottom: 36, textAlign: "center", maxWidth: 320, lineHeight: 1.8 }}>Bitte gib deine Sozialversicherungsnummer ein<br /><span style={{ fontSize: 11, opacity: .7 }}>10 Ziffern · NNNNTTMMJJ</span></div>
        <div style={{ animation: shake ? "shake .5s ease" : "none", width: "100%", maxWidth: 360 }}>
          <input type="tel" inputMode="numeric" autoFocus value={pin} maxLength={10}
            onChange={e => handleChange(e.target.value)}
            placeholder="1234140392"
            style={{ width: "100%", height: 64, textAlign: "center", fontSize: 22, fontWeight: 700, letterSpacing: 4, background: error ? "#1e0909" : CARD, border: `2px solid ${error ? "#d94f4f" : pin ? ACCENT : BORDER}`, borderRadius: 14, color: error ? "#d94f4f" : "white", outline: "none", transition: "all .2s", padding: "0 16px" }} />
          <div style={{ marginTop: 10, fontSize: 11, color: GRAY, textAlign: "center", letterSpacing: 2 }}>{pin.length} / 10</div>
        </div>
        {error && <div style={{ marginTop: 20, color: "#d94f4f", fontSize: 13 }}>✕ Nicht erkannt — bitte erneut versuchen</div>}
        <div style={{ marginTop: 56, fontSize: 11, color: GRAY, textAlign: "center", lineHeight: 1.9 }}>Deine Sozialversicherungsnummer erhältst du<br />von deinem Therapeuten bei Quarter.</div>
      </div>
    </div>
  );

  const patient = patients.find(p => p.id === patientId);
  const myPlans = plans.filter(pl => pl.patientId === patientId);
  const myLogs = logs.filter(l => l.patientId === patientId);
  return <PatientDashboard patient={patient} myPlans={myPlans} exercises={exercises} logs={myLogs} setLogs={setLogs}
    onBack={() => { setPatientId(null); setPin(""); setError(false); }} />;
}

function PatientDashboard({ patient, myPlans, exercises, logs, setLogs, onBack }) {
  const [tab, setTab] = useState("plan");
  const [selectedPlanId, setSelectedPlanId] = useState(myPlans[0]?.id || null);
  const plan = myPlans.find(p => p.id === selectedPlanId);
  const todayLogs = logs.filter(l => l.date === today());
  const weekStart = new Date(); weekStart.setDate(weekStart.getDate() - ((weekStart.getDay() + 6) % 7));
  const weekLogs = logs.filter(l => new Date(l.date) >= weekStart);

  const [logModal, setLogModal] = useState(null); // { planId, phaseId, exerciseId, item }

  function openLog(planId, phaseId, exerciseId, item) {
    window.__qrLogModalOpen = true;
    setLogModal({ planId, phaseId, exerciseId, item });
  }
  async function saveSetLog(data) {
    if (!logModal) return;
    const newLog = {
      id: "log" + uid(),
      planId: logModal.planId,
      phaseId: logModal.phaseId,
      exerciseId: logModal.exerciseId,
      patientId: patient.id,
      date: today(),
      ts: Date.now(),
      reps: data.reps,
      duration: data.duration,
      weight: data.weight,
      rpe: data.rpe ? parseInt(data.rpe) : null,
      note: data.note,
      mode: data.mode
    };
    // Update state immediately
    setLogs(prev => [...prev, newLog]);
    setLogModal(null);
    // Save directly to cloud (await to make sure it's stored)
    window.__qrSaving = true;
    try {
      const result = await window.db.upsertLog(newLog);
      console.log("Set saved to cloud:", result);
    } catch (e) {
      console.error("CLOUD SAVE FAILED:", e);
      alert("Achtung: Set konnte nicht in der Cloud gespeichert werden. Bitte Internet prüfen.\n\nFehler: " + e.message);
    }
    setTimeout(() => { window.__qrSaving = false; window.__qrLogModalOpen = false; }, 2000);
  }
  function undoLast(planId, exerciseId) {
    setLogs(prev => {
      const idx = [...prev].reverse().findIndex(l => l.planId === planId && l.exerciseId === exerciseId && l.date === today());
      if (idx === -1) return prev;
      return prev.filter((_, i) => i !== prev.length - 1 - idx);
    });
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", minHeight: "100vh" }}>
      <TopBar onBack={onBack} title={patient?.name || "Patient"} sub={patient?.diagnosis} />
      <TabBar tabs={[{ id: "plan", label: "Mein Plan" }, { id: "log", label: "Verlauf" }]} active={tab} setActive={setTab} />
      <div style={{ flex: 1, padding: "24px 20px", maxWidth: 900, margin: "0 auto", width: "100%" }}>
        {tab === "plan" && (
          <>
            {myPlans.length > 1 && (
              <div style={{ display: "flex", gap: 10, marginBottom: 20, flexWrap: "wrap", alignItems: "center" }}>
                <div style={{ fontSize: 12, color: GRAY, textTransform: "uppercase", letterSpacing: 1 }}>Plan:</div>
                {myPlans.map(pl => (
                  <button key={pl.id} onClick={() => setSelectedPlanId(pl.id)}
                    style={{ padding: "6px 14px", borderRadius: 20, border: `1px solid ${pl.id === selectedPlanId ? ACCENT : BORDER}`, background: pl.id === selectedPlanId ? ACCENT : CARD, color: pl.id === selectedPlanId ? "#000" : "white", fontSize: 12, cursor: "pointer", fontWeight: 600 }}>
                    {pl.title}
                  </button>
                ))}
              </div>
            )}
            {plan ? (
              <>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 24 }}>
                  <StatCard label="Heute" value={todayLogs.filter(l => l.planId === plan.id).length} unit="Sets" />
                  <StatCard label="Diese Woche" value={weekLogs.filter(l => l.planId === plan.id).length} unit="Sets" accent />
                </div>
                {(plan.phases || []).map(phase => (
                  <div key={phase.id} style={{ marginBottom: 28 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                      <div style={{ width: 10, height: 10, borderRadius: "50%", background: phase.color }} />
                      <div style={{ fontWeight: 700, fontSize: 15, color: phase.color }}>{phase.name}</div>
                      <div style={{ fontSize: 12, color: GRAY }}>{phase.items.length} Übung(en)</div>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                      {phase.items.map(item => {
                        const ex = exercises.find(e => e.id === item.exerciseId);
                        if (!ex) return null;
                        const doneSets = logs.filter(l => l.planId === plan.id && l.exerciseId === item.exerciseId && l.date === today()).length;
                        return <ExerciseLogCard key={item.exerciseId} ex={ex} item={item} doneSets={doneSets} phaseColor={phase.color}
                          onLog={() => openLog(plan.id, phase.id, item.exerciseId, item)} onUndo={() => undoLast(plan.id, item.exerciseId)} />;
                      })}
                    </div>
                  </div>
                ))}
              </>
            ) : (
              <div style={{ color: GRAY, fontSize: 13, marginTop: 40, textAlign: "center", lineHeight: 1.8 }}>Noch kein Trainingsplan zugewiesen.<br />Bitte deinen Therapeuten kontaktieren.</div>
            )}
          </>
        )}
        {tab === "log" && <LogHistory logs={logs} exercises={exercises} />}
      </div>
      {logModal && <SetLogModal item={logModal.item} ex={exercises.find(e => e.id === logModal.exerciseId)} onSave={saveSetLog} onCancel={() => { setLogModal(null); window.__qrLogModalOpen = false; }} />}
    </div>
  );
}

function ExerciseLogCard({ ex, item, doneSets, onLog, onUndo, phaseColor }) {
  const [videoOpen, setVideoOpen] = useState(false);
  const color = phaseColor || ACCENT;
  const total = parseInt(item.sets) || 3;
  const progress = Math.min(doneSets / total, 1);
  const done = doneSets >= total;
  return (
    <Card style={{ border: done ? `1px solid ${color}` : `1px solid ${BORDER}`, borderLeft: `3px solid ${color}` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 8 }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 700, fontSize: 16, display: "flex", alignItems: "center", gap: 8 }}>
            {done && <span style={{ color }}>✓</span>}{ex.name}
          </div>
          <div style={{ fontSize: 12, color: GRAY, marginTop: 3 }}>{item.sets} Sätze · {(item.mode || "reps") === "time" ? `${item.duration || "—"} Sek.` : `${item.reps || "—"} Wdh.`}{item.weight ? ` · ${item.weight} kg` : ""} · {item.frequency}</div>
        </div>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {ex.videoUrl && <SmallBtn onClick={() => setVideoOpen(o => !o)}>{videoOpen ? "▲" : "▶"}</SmallBtn>}
          <SmallBtn onClick={onUndo} title="Rückgängig">↩</SmallBtn>
          <button onClick={onLog} style={{ background: done ? LIGHTGRAY : color, color: done ? GRAY : "#000", border: "none", borderRadius: 8, padding: "8px 16px", fontWeight: 700, fontSize: 13, cursor: done ? "default" : "pointer", transition: "all .15s" }}>Set ✓</button>
        </div>
      </div>
      <div style={{ marginTop: 10 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
          <span style={{ fontSize: 11, color: GRAY }}>Heute: {doneSets} / {total} Sätze</span>
          <span style={{ fontSize: 11, color: done ? color : GRAY }}>{done ? "Erledigt 🎉" : `${total - doneSets} verbleibend`}</span>
        </div>
        <div style={{ height: 4, background: LIGHTGRAY, borderRadius: 2, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${progress * 100}%`, background: color, transition: "width .3s" }} />
        </div>
      </div>
      {videoOpen && ex.videoUrl && (
        <div style={{ marginTop: 12, borderRadius: 10, overflow: "hidden" }}>
          <iframe src={ex.videoUrl} width="100%" height="220" frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen title={ex.name} />
        </div>
      )}
      {ex.description && <div style={{ marginTop: 8, fontSize: 12, color: GRAY, lineHeight: 1.6, borderTop: `1px solid ${BORDER}`, paddingTop: 8 }}>{ex.description}</div>}
    </Card>
  );
}

function LogHistory({ logs, exercises }) {
  const grouped = {};
  logs.forEach(l => { if (!grouped[l.date]) grouped[l.date] = []; grouped[l.date].push(l); });
  const dates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));
  return (
    <div>
      <SectionHeader title="Trainingsverlauf" count={`${logs.length} Sets`} />
      {dates.length === 0 && <div style={{ color: GRAY, fontSize: 13, textAlign: "center", marginTop: 40 }}>Noch keine Einheiten dokumentiert.</div>}
      {dates.map(date => {
        const exGroups = {};
        grouped[date].forEach(l => { if (!exGroups[l.exerciseId]) exGroups[l.exerciseId] = []; exGroups[l.exerciseId].push(l); });
        return (
          <div key={date} style={{ marginBottom: 18 }}>
            <div style={{ fontSize: 11, letterSpacing: 2, textTransform: "uppercase", color: GRAY, marginBottom: 8 }}>{formatDate(date)}</div>
            {Object.entries(exGroups).map(([exId, sets]) => {
              const ex = exercises.find(e => e.id === exId);
              return (
                <Card key={exId} style={{ marginBottom: 8 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                    <span style={{ fontWeight: 700, fontSize: 14 }}>{ex?.name || "Übung"}</span>
                    <span style={{ fontSize: 12, color: ACCENT, fontWeight: 700 }}>{sets.length} Set{sets.length > 1 ? "s" : ""}</span>
                  </div>
                  {sets.map((s, i) => {
                    const valTxt = s.mode === "time" ? (s.duration ? s.duration + " Sek." : "—") : (s.reps ? s.reps + " Wdh." : "—");
                    return (
                      <div key={s.id} style={{ borderTop: i === 0 ? "none" : `1px solid ${BORDER}`, paddingTop: i === 0 ? 0 : 8, marginTop: i === 0 ? 0 : 8 }}>
                        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", fontSize: 12, alignItems: "center" }}>
                          <span style={{ color: GRAY, fontSize: 11 }}>Set {i + 1}</span>
                          <span style={{ color: "white", fontWeight: 600 }}>{valTxt}</span>
                          {s.weight && <span style={{ color: GRAY }}>{s.weight} kg</span>}
                          {s.rpe && <span style={{ color: rpeColor(s.rpe), fontWeight: 700 }}>RPE {s.rpe}</span>}
                        </div>
                        {s.note && <div style={{ fontSize: 11, color: GRAY, marginTop: 4, fontStyle: "italic", lineHeight: 1.5 }}>{s.note}</div>}
                      </div>
                    );
                  })}
                </Card>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

function rpeColor(rpe) {
  if (rpe <= 3) return "#7EC8E3";
  if (rpe <= 6) return ACCENT;
  if (rpe <= 8) return "#F5C842";
  return "#E8A87C";
}

function TopBar({ onBack, title, sub }) {
  return (
    <div style={{ padding: "12px 20px", borderBottom: `1px solid ${BORDER}`, display: "flex", alignItems: "center", gap: 14, background: "#0f0f0f", position: "sticky", top: 0, zIndex: 10 }}>
      <QuarterMark size={36} />
      <button onClick={onBack} style={{ background: "none", border: "none", color: GRAY, fontSize: 20, cursor: "pointer", lineHeight: 1, padding: "0 4px" }}>←</button>
      <div>
        <div style={{ fontWeight: 700, fontSize: 15 }}>{title}</div>
        {sub && <div style={{ fontSize: 11, color: GRAY }}>{sub}</div>}
      </div>
    </div>
  );
}
function TabBar({ tabs, active, setActive }) {
  return (
    <div style={{ display: "flex", borderBottom: `1px solid ${BORDER}`, background: "#0f0f0f" }}>
      {tabs.map(t => (
        <button key={t.id} onClick={() => setActive(t.id)}
          style={{ flex: 1, padding: "14px 8px", border: "none", background: "none", color: active === t.id ? ACCENT : GRAY, fontWeight: active === t.id ? 700 : 400, fontSize: 13, cursor: "pointer", borderBottom: active === t.id ? `2px solid ${ACCENT}` : "2px solid transparent", transition: "all .15s" }}>
          {t.label}
        </button>
      ))}
    </div>
  );
}
function Card({ children, style, onClick }) {
  return <div onClick={onClick} style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: "14px 16px", ...style }}>{children}</div>;
}
function SectionHeader({ title, count, action }) {
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
        <span style={{ fontWeight: 700, fontSize: 18 }}>{title}</span>
        {count !== undefined && <span style={{ fontSize: 12, color: GRAY }}>({count})</span>}
      </div>
      {action}
    </div>
  );
}
function Tag({ children }) {
  return <span style={{ display: "inline-block", background: LIGHTGRAY, color: GRAY, fontSize: 10, padding: "2px 8px", borderRadius: 20, marginTop: 4, marginRight: 4 }}>{children}</span>;
}
function StatCard({ label, value, unit, accent }) {
  return (
    <div style={{ background: accent ? `${ACCENT}15` : CARD, border: `1px solid ${accent ? ACCENT : BORDER}`, borderRadius: 12, padding: 16, textAlign: "center" }}>
      <div style={{ fontSize: 30, fontWeight: 800, color: accent ? ACCENT : "white" }}>{value}</div>
      <div style={{ fontSize: 10, color: GRAY, textTransform: "uppercase", letterSpacing: 1 }}>{unit}</div>
      <div style={{ fontSize: 11, color: GRAY, marginTop: 2 }}>{label}</div>
    </div>
  );
}
function Btn({ children, onClick, accent, style }) {
  const [hov, setHov] = useState(false);
  return (
    <button onClick={onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ padding: "8px 16px", borderRadius: 8, border: `1px solid ${accent ? ACCENT : BORDER}`, background: hov ? (accent ? ACCENT : LIGHTGRAY) : (accent ? `${ACCENT}18` : CARD), color: hov && accent ? "#000" : accent ? ACCENT : "white", fontWeight: 600, fontSize: 13, transition: "all .15s", cursor: "pointer", ...style }}>
      {children}
    </button>
  );
}
function SmallBtn({ children, onClick, title }) {
  return <button onClick={onClick} title={title} style={{ background: LIGHTGRAY, border: "none", color: GRAY, borderRadius: 6, padding: "4px 9px", fontSize: 12, cursor: "pointer" }}>{children}</button>;
}
function Input({ placeholder, value, onChange, type = "text", style }) {
  return <input type={type} placeholder={placeholder} value={value} onChange={onChange}
    style={{ background: LIGHTGRAY, border: `1px solid ${BORDER}`, color: "white", borderRadius: 8, padding: "8px 12px", fontSize: 13, width: "100%", outline: "none", ...style }} />;
}
function SmallInput({ value, onChange, type = "text", style }) {
  return <input type={type} value={value} onChange={onChange}
    style={{ background: "#1e1e1e", border: `1px solid ${BORDER}`, color: "white", borderRadius: 6, padding: "4px 8px", fontSize: 12, width: 52, marginTop: 2, outline: "none", ...style }} />;
}
function TextArea({ placeholder, value, onChange }) {
  return <textarea placeholder={placeholder} value={value} onChange={onChange} rows={3}
    style={{ background: LIGHTGRAY, border: `1px solid ${BORDER}`, color: "white", borderRadius: 8, padding: "8px 12px", fontSize: 13, width: "100%", resize: "vertical", marginTop: 10, outline: "none" }} />;
}
function Select({ value, onChange, children }) {
  return <select value={value} onChange={onChange}
    style={{ background: LIGHTGRAY, border: `1px solid ${BORDER}`, color: "white", borderRadius: 8, padding: "8px 12px", fontSize: 13, width: "100%", outline: "none" }}>{children}</select>;
}



function SetLogModal({ item, ex, onSave, onCancel }) {
  const mode = item?.mode || "reps";
  const [reps, setReps] = useState("");
  const [duration, setDuration] = useState("");
  const [weight, setWeight] = useState(item?.weight || "");
  const [rpe, setRpe] = useState(7);
  const [note, setNote] = useState("");

  function handleSave() {
    onSave({ mode, reps, duration, weight, rpe, note });
  }

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.8)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 20 }} onClick={onCancel}>
      <div onClick={e => e.stopPropagation()} style={{ background: CARD, borderRadius: 16, padding: 24, maxWidth: 440, width: "100%", border: `1px solid ${BORDER}`, maxHeight: "90vh", overflowY: "auto" }}>
        <div style={{ fontSize: 11, color: GRAY, letterSpacing: 2, textTransform: "uppercase", marginBottom: 4 }}>Set dokumentieren</div>
        <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 4, color: "white" }}>{ex?.name || "Übung"}</div>
        <div style={{ fontSize: 12, color: GRAY, marginBottom: 18 }}>Vorgabe: {mode === "time" ? `${item?.duration || "—"} Sek.` : `${item?.reps || "—"} Wdh.`}{item?.weight ? ` · ${item.weight} kg` : ""}</div>

        {mode === "reps" ? (
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: GRAY, marginBottom: 6, letterSpacing: 1, textTransform: "uppercase" }}>Wiederholungen</div>
            <Input type="number" placeholder="z.B. 12" value={reps} onChange={e => setReps(e.target.value)} />
          </div>
        ) : (
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: GRAY, marginBottom: 6, letterSpacing: 1, textTransform: "uppercase" }}>Zeit (Sekunden)</div>
            <Input type="number" placeholder="z.B. 45" value={duration} onChange={e => setDuration(e.target.value)} />
          </div>
        )}

        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, color: GRAY, marginBottom: 6, letterSpacing: 1, textTransform: "uppercase" }}>Gewicht (kg) — optional</div>
          <Input type="number" placeholder="z.B. 20" value={weight} onChange={e => setWeight(e.target.value)} />
        </div>

        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, color: GRAY, marginBottom: 6, letterSpacing: 1, textTransform: "uppercase", display: "flex", justifyContent: "space-between" }}>
            <span>Anstrengung (RPE)</span>
            <span style={{ color: ACCENT, fontWeight: 700, fontSize: 14 }}>{rpe} / 10</span>
          </div>
          <input type="range" min="1" max="10" value={rpe} onChange={e => setRpe(parseInt(e.target.value))}
            style={{ width: "100%", accentColor: ACCENT, height: 6 }} />
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: GRAY, marginTop: 4 }}>
            <span>1 = leicht</span><span>10 = maximal</span>
          </div>
        </div>

        <div style={{ marginBottom: 18 }}>
          <div style={{ fontSize: 11, color: GRAY, marginBottom: 6, letterSpacing: 1, textTransform: "uppercase" }}>Notiz — optional</div>
          <TextArea placeholder="Wie hat es sich angefühlt? Hat etwas gezogen? …" value={note} onChange={e => setNote(e.target.value)} />
        </div>

        <div style={{ display: "flex", gap: 10 }}>
          <Btn accent onClick={handleSave} style={{ flex: 1 }}>Set speichern</Btn>
          <Btn onClick={onCancel}>Abbrechen</Btn>
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
